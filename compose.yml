services:
  db:
    image: redis:7-alpine
    container_name: redis_db
    ports:
      - "6379:6379"
    networks:
      - app-network
    restart: always

  backend:
    build: ./backend
    container_name: cpp_backend
    ports:
      - "8080:8080"
    environment:
      - REDIS_HOST=db
    depends_on:
      - db
    networks:
      - app-network
    restart: always

networks:
  app-network:
    driver: bridge